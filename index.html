<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ AI 뚝딱 - 직장인 생존 텍스트 생성기</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        .prose p { margin-bottom: 0.5rem; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-xl rounded-xl shadow-lg overflow-hidden">
        
        <!-- 헤더 -->
        <header class="bg-blue-600 text-white p-6 text-center">
            <h1 class="text-3xl font-bold mb-2"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI 뚝딱</h1>
            <p class="text-blue-100 text-sm">빈칸만 채우면 일잘러의 텍스트가 완성됩니다.</p>
        </header>

        <main class="p-6">
            <!-- 메인 카테고리 탭 (현재는 비즈니스만 활성화) -->
            <div class="flex flex-wrap gap-2 mb-6 border-b pb-4">
                <button class="px-4 py-2 text-sm font-semibold rounded-t-lg bg-blue-100 text-blue-700 border-b-2 border-blue-600">🏢 비즈니스/이메일</button>
                <button class="px-4 py-2 text-sm font-semibold text-gray-400 cursor-not-allowed" disabled>🏫 과제/요약 (준비중)</button>
                <button class="px-4 py-2 text-sm font-semibold text-gray-400 cursor-not-allowed" disabled>💌 인간관계 (준비중)</button>
                <button class="px-4 py-2 text-sm font-semibold text-gray-400 cursor-not-allowed" disabled>🏪 중고거래 (준비중)</button>
            </div>

            <!-- 서브 기능(무기) 선택 버튼 영역 -->
            <div id="subFeatures" class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-8">
                <!-- app.js에서 동적으로 생성됨 -->
            </div>

            <!-- 동적 입력 폼 -->
            <form id="aiForm" class="space-y-5">
                
                <!-- Input 1 -->
                <div>
                    <label id="input1Label" for="input1" class="block text-sm font-bold text-gray-700 mb-1"></label>
                    <input type="text" id="input1" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-50 focus:bg-white"
                           placeholder="">
                </div>

                <!-- Input 2 (Textarea) -->
                <div>
                    <label id="input2Label" for="input2" class="block text-sm font-bold text-gray-700 mb-1"></label>
                    <textarea id="input2" rows="4" required
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition resize-none bg-gray-50 focus:bg-white"
                              placeholder=""></textarea>
                </div>

                <!-- Input 3 (Select or Input - 동적 변경을 위해 컨테이너 사용) -->
                <div id="input3Container">
                    <label id="input3Label" for="input3" class="block text-sm font-bold text-gray-700 mb-1"></label>
                    <!-- 내부는 app.js에서 select 또는 input으로 교체됨 -->
                </div>

                <!-- 생성 버튼 -->
                <button type="submit" id="submitBtn"
                        class="w-full mt-4 bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded-lg transition shadow-md flex items-center justify-center text-lg">
                    <i class="fa-solid fa-bolt mr-2 text-yellow-400"></i> ✨ 3초 만에 텍스트 뽑기
                </button>
            </form>

            <!-- 로딩 영역 -->
            <div id="loadingArea" class="hidden mt-8 text-center py-6">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600 mb-3"></i>
                <p class="text-gray-600 font-medium animate-pulse">상황에 맞는 최적의 단어를 고르고 있습니다...</p>
            </div>

            <!-- 결과창 영역 -->
            <div id="resultArea" class="hidden mt-8 animate-fade-in-up">
                <div class="flex items-center justify-between mb-2 border-b pb-2">
                    <h3 class="text-sm font-bold text-blue-600"><i class="fa-solid fa-check-double mr-1"></i>완성된 결과물</h3>
                </div>
                
                <div id="resultContent" class="bg-blue-50 p-5 rounded-lg text-gray-800 prose prose-sm max-w-none border border-blue-100">
                    <!-- 결과가 여기에 표시됨 -->
                </div>
                
                <!-- 복사 버튼 -->
                <button type="button" id="copyBtn" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold transition shadow-sm flex items-center justify-center">
                    <i class="fa-regular fa-copy mr-2"></i> 📋 바로 복사해서 쓰기
                </button>
            </div>
            
            <!-- 토스트 알림 -->
            <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center">
                <i class="fa-solid fa-circle-check text-green-400 mr-2 text-lg"></i> <span class="font-medium">복사 완료! Ctrl+V로 붙여넣으세요.</span>
            </div>

        </main>
    </div>

    <!-- 스크립트 연결 -->
    <script src="app.js"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    </style>
</body>
</html>
