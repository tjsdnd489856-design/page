<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ AI 뚝딱 - 쉽고 빠른 텍스트 생성기</title>
    <!-- Tailwind CSS (CDN 방식) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (아이콘용 CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- marked.js (마크다운 렌더링용 CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* 추가적인 커스텀 스타일이나 결과창 내부 여백 조정용 (tailwind로 부족한 세부 사항) */
        .prose p { margin-bottom: 0.5rem; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 flex items-center justify-center p-4">

    <!-- 메인 컨테이너 (흰색 카드 형태) -->
    <div class="bg-white w-full max-w-xl rounded-xl shadow-lg overflow-hidden">
        
        <!-- 헤더 영역 -->
        <header class="bg-blue-600 text-white p-6 text-center">
            <h1 class="text-3xl font-bold mb-2"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI 뚝딱</h1>
            <p class="text-blue-100 text-sm">빈칸만 채우면 원하는 글이 뚝딱 완성됩니다.</p>
        </header>

        <main class="p-6">
            <!-- 탭(카테고리) 영역: 자바스크립트로 동적으로 버튼들이 렌더링 됩니다 -->
            <div id="categoryTabs" class="flex flex-wrap gap-2 mb-6 justify-center">
                <!-- app.js에서 동적으로 생성됨 -->
            </div>

            <!-- 입력 폼 영역 -->
            <form id="aiForm" class="space-y-4">
                
                <!-- 대상 (Target) -->
                <div>
                    <label id="targetLabel" for="target" class="block text-sm font-medium text-gray-700 mb-1">받는 사람</label>
                    <input type="text" id="target" name="target" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                           placeholder="대상을 입력하세요">
                </div>

                <!-- 핵심 내용 (Message) -->
                <div>
                    <label id="messageLabel" for="message" class="block text-sm font-medium text-gray-700 mb-1">핵심 내용</label>
                    <textarea id="message" name="message" rows="3" required
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition resize-none"
                              placeholder="어떤 내용을 담고 싶나요?"></textarea>
                </div>

                <!-- 어조 선택 (Tone) -->
                <div>
                    <label for="tone" class="block text-sm font-medium text-gray-700 mb-1">글의 어조(말투)</label>
                    <select id="tone" name="tone" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white">
                        <!-- app.js에서 동적으로 생성됨 -->
                    </select>
                </div>

                <!-- 생성 버튼 -->
                <button type="submit" id="submitBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-md flex items-center justify-center">
                    <i class="fa-solid fa-bolt mr-2 text-yellow-300"></i> ✨ 3초 만에 찰떡같은 글 뽑기
                </button>
            </form>

            <!-- 로딩 영역 (숨김 상태) -->
            <div id="loadingArea" class="hidden mt-8 text-center text-gray-500">
                <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 mb-3"></i>
                <p class="text-sm">상황에 맞는 최적의 단어를 고르고 있습니다...</p>
            </div>

            <!-- 결과창 영역 (숨김 상태) -->
            <div id="resultArea" class="hidden mt-8">
                <h3 class="text-sm font-bold text-gray-500 mb-2 border-b pb-1">결과물</h3>
                <div id="resultContent" class="bg-gray-100 p-4 rounded-lg text-gray-800 prose prose-sm text-sm">
                    <!-- 결과가 여기에 표시됨 -->
                </div>
                
                <!-- 결과 액션 버튼들 -->
                <div class="mt-4 flex gap-3">
                    <button type="button" id="copyBtn" class="flex-1 bg-gray-800 hover:bg-gray-900 text-white py-2 rounded-lg text-sm font-medium transition shadow-sm">
                        <i class="fa-regular fa-clipboard mr-1"></i> 📋 복사해서 쓰기
                    </button>
                    <button type="button" id="retryBtn" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 py-2 rounded-lg text-sm font-medium transition shadow-sm">
                        <i class="fa-solid fa-rotate-right mr-1"></i> 🔄 다시 돌리기
                    </button>
                </div>
            </div>
            
            <!-- 복사 완료 토스트 알림 (숨김 상태) -->
            <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none">
                <i class="fa-solid fa-check mr-2"></i> 복사되었습니다!
            </div>

        </main>
    </div>

    <!-- 기능(근육) 역할을 하는 자바스크립트 연결 -->
    <script src="app.js"></script>
</body>
</html>
