<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 ChattyFox - AI Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: { 
                        primary: '#f97316', 
                        secondary: '#fbbf24',
                        orange: { 500: '#FF7A00' } 
                    } 
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- marked.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js" crossorigin="anonymous"></script>
    
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }

        .result-markdown { line-height: 1.7; word-break: keep-all; }
        .result-markdown p { margin-bottom: 0.75rem; }
        .result-markdown strong { font-weight: 800; color: #111827; background-color: rgba(253, 224, 71, 0.5); padding: 0 4px; border-radius: 4px; }
        .dark .result-markdown strong { color: #f9fafb; background-color: rgba(245, 158, 11, 0.5); }
        
        [contenteditable]:focus { outline: none; }
    </style>
</head>
<body class="bg-orange-50 text-gray-800 dark:bg-slate-950 dark:text-slate-200 font-sans min-h-screen transition-colors duration-300 flex items-center justify-center p-4">

    <!-- 상단 컨트롤 바 -->
    <div class="fixed top-4 right-4 z-40 flex items-center gap-2">
        <div class="flex bg-white dark:bg-slate-800 rounded-full shadow border border-gray-200 dark:border-slate-700 p-1">
            <button onclick="setLanguage('ko')" id="btn-ko" class="px-3 py-1 rounded-full text-sm font-bold transition-colors">KO</button>
            <button onclick="setLanguage('en')" id="btn-en" class="px-3 py-1 rounded-full text-sm font-bold transition-colors">EN</button>
        </div>
        <button id="darkModeToggle" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-800 text-slate-600 dark:text-yellow-400 rounded-full shadow border border-gray-200 dark:border-slate-700 transition-colors">
            <i class="fa-solid fa-moon dark:hidden"></i>
            <i class="fa-solid fa-sun hidden dark:block"></i>
        </button>
        <button id="openHistoryBtn" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-full shadow border border-gray-200 dark:border-slate-700 transition-colors">
            <i class="fa-solid fa-clock-rotate-left"></i>
        </button>
    </div>

    <!-- 히스토리 사이드바 -->
    <div id="historySidebar" class="fixed top-0 right-0 w-80 h-full bg-white dark:bg-slate-900 shadow-2xl transform translate-x-full transition-transform duration-300 z-50 border-l border-gray-200 dark:border-slate-800 flex flex-col">
        <div class="p-4 border-b border-gray-200 dark:border-slate-800 flex justify-between items-center bg-gray-50 dark:bg-slate-950">
            <h2 id="historyTitle" class="text-lg font-bold text-gray-800 dark:text-white"><i class="fa-solid fa-history mr-2 text-primary"></i>History</h2>
            <button id="closeHistoryBtn" class="text-gray-500 hover:text-red-500 dark:text-slate-400 text-xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="historyList" class="p-4 flex-1 overflow-y-auto space-y-3">
            <p id="historyEmptyMsg" class="text-sm text-gray-400 text-center mt-10">Empty</p>
        </div>
    </div>

    <!-- 메인 컨테이너 -->
    <div class="bg-white dark:bg-slate-900 w-full max-w-xl rounded-2xl shadow-xl overflow-hidden transition-colors border border-gray-200 dark:border-slate-800">
        <header class="p-6 text-center border-b border-gray-200 dark:border-slate-800">
            <h1 class="text-3xl font-black mb-2 flex items-center justify-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <svg width="42" height="42" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <path d="M105,55C105,80,85,100,60,100C48,100,38,95,30,88L12,95L18,78C12,69,10,59,10,48C10,25,32,10,60,10C88,10,105,30,105,55Z" fill="#FFF5E6"/>
                    <path d="M28,65C35,55,45,42,58,42L68,20L72,45C85,50,92,65,88,80C70,88,45,85,28,65Z" fill="#FF7A00"/>
                    <path d="M28,65C40,70,55,75,75,70C65,85,45,82,28,65Z" fill="#FFFFFF" fill-opacity="0.9"/>
                    <circle cx="28" cy="65" r="3" fill="#4A3022"/>
                    <path d="M45,56Q50,52,55,56" stroke="#4A3022" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                </svg>
                <span id="appLogoText"></span>
            </h1>
            <p id="appSubtitle" class="text-slate-500 text-sm"></p>
        </header>

        <main class="p-6">
            <div id="mainTabs" class="flex overflow-x-auto gap-2 border-b border-gray-200 dark:border-slate-800 mb-6 scrollbar-hide select-none cursor-grab pb-2"></div>
            <div id="subFeatures" class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-8"></div>

            <form id="aiForm" class="space-y-5">
                <div>
                    <label id="input1Label" class="block text-sm font-bold mb-1"></label>
                    <input type="text" id="input1" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary outline-none bg-gray-50 dark:bg-slate-800 dark:text-white">
                </div>
                <div>
                    <label id="input2Label" class="block text-sm font-bold mb-1"></label>
                    <textarea id="input2" rows="4" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary outline-none resize-none bg-gray-50 dark:bg-slate-800 dark:text-white"></textarea>
                </div>
                <div id="input3Container"></div>
                <button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-orange-600 text-white font-bold py-4 rounded-xl shadow-md flex items-center justify-center text-lg"></button>
            </form>

            <div id="resultArea" class="hidden mt-8 border-t border-gray-200 dark:border-slate-800 pt-6">
                <h3 id="resultTitle" class="text-sm font-bold text-primary mb-3"></h3>
                <div id="resultContent" class="bg-white dark:bg-slate-800 p-6 rounded-xl border-2 border-orange-200 dark:border-slate-700 min-h-[150px] text-sm sm:text-base result-markdown"></div>
                <div class="flex flex-col sm:flex-row gap-3 mt-4">
                    <button type="button" id="copyBtn" class="flex-1 bg-primary text-white py-3 rounded-xl font-bold shadow"></button>
                    <div class="flex gap-2">
                        <button type="button" id="btnLike" class="w-16 bg-gray-100 dark:bg-slate-800 py-3 rounded-xl border">👍</button>
                        <button type="button" id="btnDislike" class="w-16 bg-gray-100 dark:bg-slate-800 py-3 rounded-xl border">👎</button>
                    </div>
                </div>
            </div>
            
            <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full transition-all opacity-0 pointer-events-none">
                <span id="toastMsg"></span>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
